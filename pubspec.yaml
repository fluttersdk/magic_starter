name: magic_starter
description: Starter kit for Magic Framework. Auth, Profile, Teams, Notifications — 13 opt-in features with overridable views.
version: 0.0.1-alpha.3
homepage: https://magic.fluttersdk.com/starter
documentation: https://magic.fluttersdk.com/packages/starter/getting-started/installation
repository: https://github.com/fluttersdk/magic_starter
issue_tracker: https://github.com/fluttersdk/magic_starter/issues

topics:
  - authentication
  - starter-kit
  - magic
  - flutter
  - admin-panel

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  magic: ^1.0.0-alpha.3
  magic_cli: ^0.0.1-alpha.3
  magic_notifications: ^0.0.1-alpha.1
  args: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  flutter_lints: ^6.0.0

executables:
  magic_starter: magic_starter

flutter:
  assets:
    - assets/stubs/install/
