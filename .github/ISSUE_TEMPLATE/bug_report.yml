name: Bug Report
description: Report a bug in Magic Starter Plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Enable `teams` and `profile_photos` features in config
        2. Navigate to profile settings
        3. Tap "Upload Photo"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which part of the plugin is affected?
      options:
        - Authentication (Login, Register, Password Reset)
        - Guest Auth (OTP, Phone Login)
        - Profile (Photo, Email, Password, Sessions, Timezones)
        - Teams (Create, Invite, Members, Roles)
        - Notifications (Polling, Mark Read, Preferences)
        - Newsletter (Subscribe/Unsubscribe)
        - Views & Layouts (AppLayout, GuestLayout, Wind UI)
        - View Registry (Custom views, Overrides)
        - Configuration (Feature flags, Route paths)
        - CLI (Install, Configure, Doctor, Publish, Uninstall)
        - Service Provider (IoC, Gate abilities)
        - Other
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproduction Code
      description: A minimal code snippet to reproduce the issue.
      render: dart

  - type: input
    id: plugin-version
    attributes:
      label: Magic Starter Version
      placeholder: "0.0.1-alpha.1"
    validations:
      required: true

  - type: input
    id: magic-version
    attributes:
      label: Magic Framework Version
      placeholder: "1.0.0-alpha.3"
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      placeholder: "3.27.0"
    validations:
      required: true
